name: PR Tests
run-name: PR Tests by ${{ github.actor }}

on:
  pull_request:
    branches:
      - 'main'
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Dependency resolution: these reusable jobs resolve through the public repositories by design —
# the committed default is `dependency.env=stage` with `proxy.location` unset, which falls back to the
# public repository set (see settings.gradle.kts / root build.gradle.kts). No internal proxy is
# reachable from GitHub-hosted runners, so public resolution is the intended CI behavior.
jobs:
  build-check:
    uses: khorum-oss/public-cicd/.github/workflows/gradle-build.yml@main
    with:
      java-version: '21'

  detekt-check:
    needs: build-check
    uses: khorum-oss/public-cicd/.github/workflows/gradle-detekt.yml@main
    with:
      java-version: '21'

  unit-tests:
    needs: build-check
    uses: khorum-oss/public-cicd/.github/workflows/gradle-unit-tests.yml@main
    permissions:
      contents: read
      pull-requests: write
    with:
      java-version: '21'
      coverage-enabled: true
      min-coverage-overall: 40

  # Web UI (SvelteKit) — type-check, node unit tests, and Playwright E2E. Independent of the Gradle
  # jobs (web/ is not a Gradle module). The E2E specs mock /api/* at the browser layer, so no backend
  # is needed.
  web-tests:
    name: Web UI Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check
      - run: pnpm run test:unit
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm run test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7