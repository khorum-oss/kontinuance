name: Deploy Images

# Builds the container images from source so the Dockerfiles have automated build coverage. Runs on
# changes to the deploy artifacts (and on demand). Build only — nothing is pushed here.
on:
  push:
    branches: [main]
    paths:
      - "deploy/**"
      - ".github/workflows/deploy-images.yml"
  pull_request:
    paths:
      - "deploy/**"
      - ".github/workflows/deploy-images.yml"
  workflow_dispatch:

jobs:
  build-images:
    name: Build container images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build server image
        # Multi-stage build runs :server:installDist with dependency verification enabled.
        run: docker build -f deploy/server.Dockerfile -t kontinuance-server:ci .

      - name: Build web image
        run: docker build -f deploy/web.Dockerfile -t kontinuance-web:ci .
