# Example nginx reverse proxy for Kontinuance: serves the built web UI and puts the API on the SAME
# ORIGIN so the SPA's /api and /ws/runs calls work. Adapt server_name, the root path, and the upstream.
#
# Build the UI first: `pnpm --dir web build` -> static assets in web/build/ (SPA, index.html fallback).
# Run the server (defaults to 127.0.0.1:8077).

upstream kontinuance_api {
    server 127.0.0.1:8077;
}

server {
    listen 80;
    server_name kontinuance.example.com;

    # --- Static single-page app -------------------------------------------------
    root /srv/kontinuance/web/build;   # contents of web/build/
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;   # client-side routing fallback
    }

    # --- Server-sent events: the live run stream --------------------------------
    # Must come before the generic /api/ block so buffering is disabled for the stream.
    location = /api/runs/stream {
        proxy_pass http://kontinuance_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;            # stream events immediately
        proxy_read_timeout 1h;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- REST API (read + trigger/approve/reject) -------------------------------
    location /api/ {
        proxy_pass http://kontinuance_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- Live WebSocket ---------------------------------------------------------
    location /ws/runs {
        proxy_pass http://kontinuance_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 1h;
        proxy_set_header Host $host;
    }
}

# NOTE: the Kontinuance API has no authentication (this release). Terminate TLS here and add an
# authentication layer (e.g. auth_request, mTLS, or an SSO proxy) before exposing this server publicly.
