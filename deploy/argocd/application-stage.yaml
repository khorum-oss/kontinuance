apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kontinuance-stage
  namespace: argocd
spec:
  project: kontinuance
  source:
    repoURL: https://github.com/khorum-oss/kontinuance.git
    targetRevision: main
    path: deploy/k8s/overlays/stage
  destination:
    server: https://kubernetes.default.svc
    namespace: kontinuance-stage
  # Stage auto-syncs: every committed change to the stage overlay is applied immediately.
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
