apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kontinuance-stage

resources:
  - ../../base

# Registry + tag for this environment. release.sh pins the tag here (stage auto-syncs via ArgoCD).
images:
  - name: kontinuance-server
    newName: ghcr.io/khorum-oss/kontinuance-server
    newTag: stage
  - name: kontinuance-web
    newName: ghcr.io/khorum-oss/kontinuance-web
    newTag: stage

patches:
  - target:
      kind: Ingress
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: kontinuance.stage.example.com
