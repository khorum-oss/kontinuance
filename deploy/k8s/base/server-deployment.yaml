apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
  labels:
    app.kubernetes.io/name: kontinuance
    app.kubernetes.io/component: server
spec:
  # Single replica: the file-backed run store is single-writer (see pvc.yaml).
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kontinuance
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kontinuance
        app.kubernetes.io/component: server
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: server
          image: kontinuance-server
          ports:
            - name: http
              containerPort: 8077
          envFrom:
            - configMapRef:
                name: config
            - secretRef:
                name: secrets
          volumeMounts:
            - name: runs
              mountPath: /data/runs
            - name: descriptor
              mountPath: /etc/kontinuance
              readOnly: true
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 384Mi
            limits:
              memory: 768Mi
      volumes:
        - name: runs
          persistentVolumeClaim:
            claimName: runs
        - name: descriptor
          configMap:
            name: descriptor
