apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  labels:
    app.kubernetes.io/name: kontinuance
    app.kubernetes.io/component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kontinuance
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kontinuance
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: web
          image: kontinuance-web
          ports:
            - name: http
              containerPort: 80
          env:
            # In-cluster server Service (namePrefix makes the server Service "kontinuance-server").
            - name: KONTINUANCE_BACKEND
              value: "http://kontinuance-server:8077"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 128Mi
