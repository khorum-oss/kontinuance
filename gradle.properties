micronautVersion=4.5.3
ksp.useKSP2=true
org.gradle.s3.endpoint=https://nyc3.digitaloceanspaces.com
# Dependency resolution environment: stage|dev|prod|public. CI passes -Pdependency.env=public.
# Leave proxy.location unset to resolve through public repositories by default (no internal proxy
# required); set it to an internal proxy URL to route non-public builds through it.
dependency.env=stage
#proxy.location=http://localhost:8081
org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m
#org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.cache=true